<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán - Luxury Grand Hotel</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: #fff;
            font-family: 'Poppins', sans-serif;
        }

        .container {
            max-width: 520px;
            margin: 60px auto;
            padding: 30px;
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        h2 {
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            color: #d4af37;
            margin-bottom: 25px;
        }

        .booking-box {
            background: rgba(255,255,255,0.04);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .booking-box p {
            margin: 6px 0;
            font-size: 0.9rem;
            color: #ccc;
        }

        .price {
            color: #d4af37;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .pay-list {
            display:flex;
            flex-direction:column;
            gap:12px;
            margin-bottom:20px;
        }

        .pay-card {
            padding:14px 16px;
            border-radius:10px;
            border:1px solid rgba(255,255,255,0.1);
            cursor:pointer;
            transition: all .25s;
            background: rgba(255,255,255,0.02);
        }

        .pay-card:hover {
            border-color:#d4af37;
        }

        .pay-card.active {
            border-color:#d4af37;
            background: rgba(212,175,55,0.12);
        }

        .hidden { display:none; }

        .qr-box {
            text-align:center;
            margin-top:15px;
        }

        .qr-box img {
            border-radius:10px;
            box-shadow:0 10px 20px rgba(0,0,0,0.5);
        }

        input {
            width:100%;
            padding:10px;
            border-radius:6px;
            border:none;
            margin-bottom:10px;
            background:#111;
            color:#fff;
        }

        input::placeholder {
            color:#777;
        }

        .btn {
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background: linear-gradient(135deg, #d4af37, #f1d27a);
            color:#000;
            font-weight:bold;
            cursor:pointer;
            margin-top:15px;
            transition:0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow:0 10px 25px rgba(212,175,55,0.4);
        }

    </style>
</head>
<body>

<div class="container">

    <h2>Thanh toán hóa đơn</h2>

    <div class="booking-box">
        <p>Mã đơn: <b>#<span th:text="${booking.id}"></span></b></p>
        <p>Check-in: <span th:text="${booking.checkInDate}"></span></p>
        <p>Check-out: <span th:text="${booking.checkOutDate}"></span></p>
        <p class="price">Tổng tiền: <span th:text="${booking.totalPrice}"></span> VNĐ</p>
    </div>

    <form th:action="@{/payment/{id}(id=${booking.id})}" method="post" onsubmit="return validateForm()">

        <input type="hidden" id="method" name="paymentMethod" value="CASH">

        <div class="pay-list">
            <div class="pay-card" onclick="pick('TRANSFER','qrBox',this)">💳 Chuyển khoản QR</div>
            <div class="pay-card" onclick="pick('CARD','cardBox',this)">🏦 Thẻ ngân hàng</div>
            <div class="pay-card" onclick="pick('CASH',null,this)">💵 Tiền mặt</div>
        </div>

        <!-- QR -->
        <div id="qrBox" class="hidden qr-box">
            <p>Quét mã QR để thanh toán</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=PAYMENT">
        </div>

        <!-- CARD -->
        <div id="cardBox" class="hidden">
            <input type="text" id="cardNumber" placeholder="Số thẻ">
            <input type="text" id="cardName" placeholder="Tên chủ thẻ">
            <input type="text" placeholder="MM/YY">
            <input type="text" placeholder="CVV">
        </div>

        <button class="btn">XÁC NHẬN THANH TOÁN</button>

    </form>
</div>

<script>
function pick(method, boxId, el) {
    document.getElementById("method").value = method;

    document.querySelectorAll('.pay-card').forEach(e => e.classList.remove('active'));
    el.classList.add('active');

    document.getElementById('qrBox').style.display = 'none';
    document.getElementById('cardBox').style.display = 'none';

    if(boxId) document.getElementById(boxId).style.display = 'block';
}

function validateForm() {
    let method = document.getElementById("method").value;

    if(method === "CARD") {
        let num = document.getElementById("cardNumber").value;
        if(num === "") {
            alert("Nhập số thẻ!");
            return false;
        }
    }

    if(method === "TRANSFER") {
        if(!confirm("Bạn đã chuyển khoản chưa?")) return false;
    }

    return true;
}
</script>

</body>
</html>
