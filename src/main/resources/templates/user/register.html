<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Luxury Grand Hotel</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">🏨 Luxury Grand</div>
            <h1 class="auth-title">Tạo tài khoản</h1>
            <p class="auth-subtitle">Đăng ký để trải nghiệm dịch vụ đặt phòng.</p>
        </div>
        
        <div class="auth-body">
            <div th:if="${error}" class="alert alert-error" data-auto-dismiss>
                ⚠ <span th:text="${error}"></span>
            </div>
            
            <form th:action="@{/register}" method="post" data-validate>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Họ và tên *</label>
                        <input type="text" name="fullName" class="form-control" 
                               placeholder="Nguyễn Văn A" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tên đăng nhập *</label>
                        <input type="text" name="username" class="form-control" 
                               placeholder="username123" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email *</label>
                    <input type="email" name="email" class="form-control" 
                           placeholder="email@example.com" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Mật khẩu *</label>
                        <input type="password" name="password" id="password" 
                               class="form-control" placeholder="Tối thiểu 6 ký tự" 
                               minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Xác nhận mật khẩu *</label>
                        <input type="password" name="confirmPassword" id="confirmPassword" 
                               class="form-control" placeholder="Nhập lại mật khẩu" required>
                    </div>
                </div>
                
                <div style="margin-bottom:20px;font-size:0.8rem;color:var(--text-muted);">
                    Bằng cách đăng ký, bạn đồng ý với 
                    <a href="#" style="color:var(--accent);">điều khoản sử dụng</a> của chúng tôi.
                </div>
                
                <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;"
                        onclick="return validatePasswords()">
                    Tạo tài khoản →
                </button>
            </form>
            
            <div class="auth-footer" style="margin-top:20px;">
                Đã có tài khoản? <a th:href="@{/login}">Đăng nhập ngay</a>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script>
function validatePasswords() {
    const pass = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    if (pass !== confirm) {
        alert('Mật khẩu xác nhận không khớp!');
        return false;
    }
    return true;
}
</script>
</body>
</html>
