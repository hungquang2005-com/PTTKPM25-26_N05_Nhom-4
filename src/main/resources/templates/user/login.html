<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Luxury Grand Hotel</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">🏨 Luxury Grand</div>
            <h1 class="auth-title">Đăng nhập</h1>
            <p class="auth-subtitle">Chào mừng trở lại! Vui lòng đăng nhập.</p>
        </div>
        
        <div class="auth-body">
            <!-- Thông báo lỗi từ Spring Security -->
            <div th:if="${param.error}" class="alert alert-error">
                ⚠ Tên đăng nhập hoặc mật khẩu không đúng!
            </div>
            
            <!-- Thông báo thành công -->
            <div th:if="${param.logout}" class="alert alert-success">
                ✓ Đăng xuất thành công!
            </div>
            
            <!-- Flash messages từ register -->
            <div th:if="${success}" class="alert alert-success">
                ✓ <span th:text="${success}"></span>
            </div>
            
            <!-- Form đăng nhập - Spring Security xử lý POST /login -->
            <form th:action="@{/login}" method="post" data-validate autocomplete="off">
                <div class="form-group">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" name="username" class="form-control" autocomplete="off" 
                           placeholder="Nhập tên đăng nhập" required autofocus>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Mật khẩu</label>
                    <div style="position:relative;">
                        <input type="password" name="password" id="passwordInput" class="form-control"
                               autocomplete="new-password" placeholder="Nhập mật khẩu" required
                               style="padding-right:44px;">
                        <button type="button" id="togglePassword"
                                style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                                       background:none;border:none;cursor:pointer;padding:4px;
                                       color:var(--text-muted);display:flex;align-items:center;">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.875rem;color:var(--text-muted);">
                        <input type="checkbox" name="remember-me">
                        Nhớ đăng nhập
                    </label>
                    <a href="#" style="font-size:0.875rem;color:var(--accent);">Quên mật khẩu?</a>
                </div>
                
                <!-- CSRF token - Spring Security yêu cầu -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                
                <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;">
                    Đăng nhập →
                </button>
            </form>
            
            <div class="auth-divider">hoặc</div>
            
            <div class="auth-footer">
                Chưa có tài khoản? 
                <a th:href="@{/register}">Đăng ký ngay</a>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput  = document.getElementById('passwordInput');
    const eyeIcon        = document.getElementById('eyeIcon');

    const eyeOpen  = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    const eyeSlash = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

    togglePassword.addEventListener('click', () => {
        const isHidden = passwordInput.type === 'password';
        passwordInput.type = isHidden ? 'text' : 'password';
        eyeIcon.innerHTML  = isHidden ? eyeSlash : eyeOpen;
    });
</script>
</body>
</html>
