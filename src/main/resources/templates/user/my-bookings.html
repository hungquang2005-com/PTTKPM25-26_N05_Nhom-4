<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking của tôi</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- ====== FORM NHẬP EMAIL (khi chưa tìm kiếm) ====== -->
<div th:if="${bookings == null}"
     style="min-height:100vh;display:flex;align-items:center;justify-content:center;
            background:#0d0f14;font-family:'DM Sans',sans-serif;">
    <div style="width:100%;max-width:420px;background:#13161d;border:1px solid #1f2330;
                border-radius:16px;padding:2.5rem 2rem;
                box-shadow:0 32px 80px rgba(0,0,0,.6);">

        <div style="text-align:center;margin-bottom:2rem;">
            <div style="font-size:2rem;margin-bottom:.5rem;">📋</div>
            <h2 style="color:#e8e2d5;font-size:1.4rem;margin:0 0 .5rem;">Tra cứu đặt phòng</h2>
            <p style="color:#6b7280;font-size:.875rem;margin:0;">
                Nhập email bạn đã dùng khi đặt phòng
            </p>
        </div>

        <form th:action="@{/my-bookings}" method="get">
            <div style="margin-bottom:1.25rem;">
                <label style="display:block;font-size:.8rem;font-weight:500;
                               letter-spacing:.06em;text-transform:uppercase;
                               color:#6b7280;margin-bottom:.45rem;">
                    Email
                </label>
                <input type="email" name="email" required
                       placeholder="example@email.com"
                       style="width:100%;padding:.75rem 1rem;background:#0a0c10;
                              border:1px solid #1f2330;border-radius:8px;
                              color:#e8e2d5;font-size:.95rem;outline:none;
                              box-sizing:border-box;">
            </div>
            <button type="submit"
                    style="width:100%;padding:.85rem;
                           background:linear-gradient(135deg,#a07830,#c9a84c);
                           color:#0d0f14;font-size:.95rem;font-weight:600;
                           border:none;border-radius:8px;cursor:pointer;">
                🔍 Tìm booking
            </button>
        </form>

        <div style="text-align:center;margin-top:1.5rem;">
            <a th:href="@{/}" style="color:#6b7280;font-size:.85rem;text-decoration:none;">
                ← Về trang chủ
            </a>
        </div>
    </div>
</div>

<!-- ====== KẾT QUẢ BOOKING ====== -->
<div th:if="${bookings != null}"
     style="min-height:100vh;background:#0d0f14;padding:40px 20px;
            font-family:'DM Sans',sans-serif;">

    <div style="max-width:960px;margin:auto;">

        <!-- Header -->
        <div style="display:flex;align-items:center;justify-content:space-between;
                    margin-bottom:24px;flex-wrap:wrap;gap:12px;">
            <div>
                <h2 style="color:#e8e2d5;margin:0 0 4px;">📋 Booking của tôi</h2>
                <p style="color:#6b7280;font-size:.875rem;margin:0;">
                    Email: <span style="color:#c9a84c;" th:text="${email}"></span>
                    &nbsp;·&nbsp;
                    <span th:text="${count}"></span> đơn
                </p>
            </div>
            <a th:href="@{/my-bookings}"
               style="color:#6b7280;font-size:.875rem;text-decoration:none;
                      border:1px solid #1f2330;padding:6px 14px;border-radius:8px;">
                🔄 Tìm email khác
            </a>
        </div>

        <!-- Không có booking -->
        <div th:if="${#lists.isEmpty(bookings)}"
             style="text-align:center;padding:60px 20px;background:#13161d;
                    border:1px solid #1f2330;border-radius:12px;color:#6b7280;">
            <div style="font-size:2.5rem;margin-bottom:12px;">🔍</div>
            <p style="margin:0;font-size:1rem;">Không tìm thấy booking nào cho email này.</p>
            <a th:href="@{/rooms}"
               style="display:inline-block;margin-top:16px;color:#c9a84c;text-decoration:none;">
                Đặt phòng ngay →
            </a>
        </div>

        <!-- Danh sách booking -->
        <div th:if="${!#lists.isEmpty(bookings)}"
             style="background:#13161d;border:1px solid #1f2330;border-radius:12px;overflow:hidden;">
            <div style="overflow-x:auto;">
                <table style="width:100%;border-collapse:collapse;text-align:left;">
                    <thead>
                        <tr style="border-bottom:1px solid #1f2330;">
                            <th style="padding:14px 16px;color:#6b7280;font-size:.8rem;
                                       font-weight:500;letter-spacing:.06em;text-transform:uppercase;">
                                #ID
                            </th>
                            <th style="padding:14px 16px;color:#6b7280;font-size:.8rem;
                                       font-weight:500;letter-spacing:.06em;text-transform:uppercase;">
                                Phòng
                            </th>
                            <th style="padding:14px 16px;color:#6b7280;font-size:.8rem;
                                       font-weight:500;letter-spacing:.06em;text-transform:uppercase;">
                                Check-in
                            </th>
                            <th style="padding:14px 16px;color:#6b7280;font-size:.8rem;
                                       font-weight:500;letter-spacing:.06em;text-transform:uppercase;">
                                Check-out
                            </th>
                            <th style="padding:14px 16px;color:#6b7280;font-size:.8rem;
                                       font-weight:500;letter-spacing:.06em;text-transform:uppercase;">
                                Tổng tiền
                            </th>
                            <th style="padding:14px 16px;color:#6b7280;font-size:.8rem;
                                       font-weight:500;letter-spacing:.06em;text-transform:uppercase;">
                                Trạng thái
                            </th>
                            <th style="padding:14px 16px;color:#6b7280;font-size:.8rem;
                                       font-weight:500;letter-spacing:.06em;text-transform:uppercase;">
                                Hành động
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="b : ${bookings}"
                            style="border-bottom:1px solid #1a1d26;transition:background .15s;"
                            onmouseover="this.style.background='#1a1d26'"
                            onmouseout="this.style.background='transparent'">

                            <td style="padding:14px 16px;color:#6b7280;font-size:.875rem;"
                                th:text="'#' + ${b.id}"></td>

                            <td style="padding:14px 16px;">
                                <span style="color:#e8e2d5;font-weight:600;"
                                      th:text="${b.room.roomNumber}"></span>
                                <span style="color:#6b7280;font-size:.8rem;margin-left:6px;"
                                      th:text="'(' + ${b.room.roomType} + ')'"></span>
                            </td>

                            <td style="padding:14px 16px;color:#e8e2d5;font-size:.875rem;"
                                th:text="${#temporals.format(b.checkInDate,'dd/MM/yyyy')}"></td>

                            <td style="padding:14px 16px;color:#e8e2d5;font-size:.875rem;"
                                th:text="${#temporals.format(b.checkOutDate,'dd/MM/yyyy')}"></td>

                            <td style="padding:14px 16px;color:#c9a84c;font-weight:600;font-size:.875rem;"
                                th:text="${#numbers.formatDecimal(b.totalPrice,0,'COMMA',0,'POINT') + ' đ'}"></td>

                            <td style="padding:14px 16px;">
                                <span th:text="${b.status}"
                                      th:style="${b.status == 'CONFIRMED'} ? 'background:rgba(16,185,129,.15);color:#10b981;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;'
                                              : (${b.status == 'COMPLETED'} ? 'background:rgba(99,102,241,.15);color:#818cf8;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;'
                                              : 'background:rgba(239,68,68,.15);color:#f87171;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;')">
                                </span>
                            </td>

                            <td style="padding:14px 16px;">
                                <a th:href="@{/invoice/{id}(id=${b.id})}"
                                   style="color:#c9a84c;font-size:.875rem;text-decoration:none;
                                          font-weight:500;white-space:nowrap;">
                                    📄 Xem hóa đơn
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div style="text-align:center;margin-top:24px;">
            <a th:href="@{/}" style="color:#6b7280;font-size:.875rem;text-decoration:none;">
                ← Về trang chủ
            </a>
        </div>
    </div>
</div>

</body>
</html>
