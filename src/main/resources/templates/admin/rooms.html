<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý phòng - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">
<div class="admin-layout">

    <!-- Sidebar (giống dashboard) -->
    <aside class="admin-sidebar" id="sidebar">
        <div class="sidebar-brand">
            <span class="sidebar-brand-icon">🏨</span>
            <span class="sidebar-brand-text">Admin Panel</span>
        </div>
        <nav class="sidebar-nav">
            <a th:href="@{/admin}" class="sidebar-link">📊 Dashboard</a>
            <a th:href="@{/admin/rooms}" class="sidebar-link active">🛏 Quản lý Phòng</a>
            <a th:href="@{/admin/bookings}" class="sidebar-link">📋 Đặt phòng</a>
            <a th:href="@{/admin/customers}" class="sidebar-link">👥 Khách hàng</a>
            <a th:href="@{/admin/stats}" class="sidebar-link">📈 Thống kê</a>
            <div class="sidebar-divider"></div>
            <a th:href="@{/}" class="sidebar-link">🌐 Xem website</a>
            <a th:href="@{/logout}" class="sidebar-link sidebar-logout">🚪 Đăng xuất</a>
        </nav>
    </aside>

    <main class="admin-main">
        <header class="admin-topbar">
            <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
            <h1 class="admin-page-title">Quản lý Phòng</h1>
        </header>

        <div class="admin-content">
            <!-- Flash -->
            <div th:if="${success}" class="alert alert-success">✓ <span th:text="${success}"></span></div>
            <div th:if="${error}" class="alert alert-error">⚠ <span th:text="${error}"></span></div>

            <!-- ADD ROOM FORM -->
            <div class="admin-card" style="margin-bottom:24px;">
                <div class="admin-card-header">
                    <h3>➕ Thêm phòng mới</h3>
                    <button class="btn-table-action" onclick="toggleAddForm()">
                        Mở / Đóng form
                    </button>
                </div>
                <div class="admin-card-body" id="addRoomForm" style="display:none;">
                    <form th:action="@{/admin/rooms/add}" method="post">
                        <div class="form-grid-3">
                            <div class="form-group">
                                <label class="form-label">Số phòng *</label>
                                <input type="text" name="roomNumber" class="form-control"
                                       placeholder="101" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Loại phòng *</label>
                                <select name="roomType" class="form-control">
                                    <option value="Standard">Standard</option>
                                    <option value="Deluxe">Deluxe</option>
                                    <option value="Suite">Suite</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Giá/đêm (đ) *</label>
                                <input type="number" name="price" class="form-control"
                                       placeholder="500000" required min="0">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Sức chứa</label>
                                <input type="number" name="capacity" class="form-control"
                                       value="2" min="1" max="10">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Tầng</label>
                                <input type="number" name="floor" class="form-control"
                                       value="1" min="1">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Diện tích (m²)</label>
                                <input type="number" name="area" class="form-control"
                                       value="30" step="0.5" min="10">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Mô tả</label>
                            <textarea name="description" class="form-control" rows="2"
                                      placeholder="Mô tả phòng..."></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">URL ảnh</label>
                            <input type="text" name="imageUrl" class="form-control"
                                   placeholder="https://images.unsplash.com/...">
                        </div>
                        <div style="display:flex;gap:16px;align-items:center;margin-bottom:16px;">
                            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.875rem;">
                                <input type="checkbox" name="wifi" checked> WiFi
                            </label>
                            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.875rem;">
                                <input type="checkbox" name="breakfast"> Bữa sáng
                            </label>
                            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.875rem;">
                                <input type="checkbox" name="airConditioner" checked> Điều hòa
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary" style="padding:10px 28px;">
                            ➕ Thêm phòng
                        </button>
                    </form>
                </div>
            </div>

            <!-- ROOMS TABLE -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <h3>📋 Danh sách phòng (<span th:text="${#lists.size(rooms)}"></span>)</h3>
                </div>
                <div class="admin-card-body" style="padding:0;">
                    <div class="table-wrap">
                        <table class="admin-table">
                            <thead>
                            <tr>
                                <th>Số phòng</th>
                                <th>Loại</th>
                                <th>Giá/đêm</th>
                                <th>Sức chứa</th>
                                <th>Tầng</th>
                                <th>Trạng thái</th>
                                <th>Tiện nghi</th>
                                <th>Thao tác</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="room : ${rooms}">
                                <td style="font-weight:600;" th:text="${room.roomNumber}"></td>
                                <td>
                                    <span class="room-type-badge"
                                          th:classappend="'type-' + ${room.roomType.toLowerCase()}"
                                          th:text="${room.roomType}"></span>
                                </td>
                                <td th:text="${#numbers.formatDecimal(room.price,0,'COMMA',0,'POINT') + ' đ'}"></td>
                                <td th:text="${room.capacity} + ' người'"></td>
                                <td th:text="'Tầng ' + ${room.floor}"></td>
                                <td>
                                    <span class="status-badge"
                                          th:classappend="${room.status == 'AVAILABLE'} ? 'status-available' : 'status-booked'"
                                          th:text="${room.status == 'AVAILABLE'} ? 'Còn trống' : 'Đã đặt'">
                                    </span>
                                </td>
                                <td style="font-size:1rem;">
                                    <span th:if="${room.wifi}" title="WiFi">📶</span>
                                    <span th:if="${room.breakfast}" title="Bữa sáng">🍳</span>
                                    <span th:if="${room.airConditioner}" title="Điều hòa">❄️</span>
                                </td>
                                <td>
                                    <div style="display:flex;gap:8px;">
                                        <a th:href="@{/admin/rooms/edit/{id}(id=${room.id})}"
                                           class="btn-action btn-edit">✏️ Sửa</a>
                                        <a th:href="@{/admin/rooms/delete/{id}(id=${room.id})}"
                                           class="btn-action btn-delete"
                                           onclick="return confirm('Xác nhận xóa phòng này?')">
                                            🗑 Xóa
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>
<script>
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function toggleAddForm() {
        const f = document.getElementById('addRoomForm');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
    }
</script>
</body>
</html>
