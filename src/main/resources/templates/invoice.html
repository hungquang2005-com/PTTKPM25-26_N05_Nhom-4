<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa đơn - Luxury Grand Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        @media print {
            .no-print { display:none !important; }
            body { background:#fff !important; color:#000 !important; }
            .invoice-wrapper { border:1px solid #ccc !important; }
            .invoice-header { background:#f8f8f8 !important; }
        }
        .invoice-wrapper { max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 8px;}
    </style>
</head>
<body style="padding-top:40px;padding-bottom:60px;">

<nav class="navbar no-print" id="mainNav" style="position:relative;backdrop-filter:none;
     background:var(--bg-secondary);border-bottom:1px solid var(--border);">
    <div style="text-align: center; padding: 15px; font-weight: bold;">LUXURY GRAND HOTEL</div>
</nav>

<div class="container">
    <div th:if="${booking != null}" class="invoice-wrapper">
        <div class="invoice-header" style="text-align: center; margin-bottom: 20px;">
            <h2 style="color: #d4af37;">HÓA ĐƠN ĐẶT PHÒNG</h2>
            <p>Mã hóa đơn: #<span th:text="${booking.id}"></span></p>
        </div>

        <div class="invoice-body">
            <p><strong>Ngày nhận phòng:</strong> <span th:text="${booking.checkInDate}"></span></p>
            <p><strong>Ngày trả phòng:</strong> <span th:text="${booking.checkOutDate}"></span></p>
            <p><strong>Số đêm:</strong> <span th:text="${nights}"></span></p>
            <p><strong>Tổng tiền:</strong> <span style="font-size: 1.2rem; color: #d4af37; font-weight: bold;" th:text="${booking.totalPrice} + ' VNĐ'"></span></p>
            <p><strong>Trạng thái thanh toán:</strong> <span th:text="${booking.paymentStatus}"></span></p>
            <p><strong>Phương thức:</strong> <span th:text="${booking.paymentMethod}"></span></p>

            <div th:if="${booking.notes != null and !booking.notes.isEmpty()}" style="margin-top: 15px;">
                <div style="color:var(--accent);margin-bottom:6px;font-weight:700;">GHI CHÚ</div>
                <p style="font-size:.86rem;color:var(--text-secondary);margin:0;" th:text="${booking.notes}"></p>
            </div>

            <div style="text-align:center;margin-top:36px;padding-top:22px; border-top:1px solid #eee;">
                <div style="font-family:var(--font-display);font-size:1.25rem; color:#d4af37;margin-bottom:6px;">
                    Cảm ơn quý khách!
                </div>
                <p style="font-size:.78rem;color:var(--text-muted);">
                    Luxury Grand Hotel mong được phục vụ quý khách trong lần sau.
                </p>
            </div>
            
            <div class="no-print" style="text-align: center; margin-top: 20px;">
                <button onclick="window.print()" style="padding: 10px 20px; background: #222; color: #fff; cursor: pointer; border: none; border-radius: 5px;">IN HÓA ĐƠN</button>
                <a href="/" style="display: inline-block; padding: 10px 20px; text-decoration: none; color: #222; border: 1px solid #222; border-radius: 5px; margin-left: 10px;">VỀ TRANG CHỦ</a>
            </div>
        </div>
    </div>

    <div th:unless="${booking != null}" style="text-align:center;padding:80px 24px;color:var(--text-muted);">
        <div style="font-size:3rem;margin-bottom:12px;">🔍</div>
        <h2 style="font-family:var(--font-display);font-size:1.5rem;margin-bottom:8px;">
            Không tìm thấy hóa đơn
        </h2>
        <a href="/" style="color: #d4af37;">Quay về trang chủ</a>
    </div>
</div>

</body>
</html>
