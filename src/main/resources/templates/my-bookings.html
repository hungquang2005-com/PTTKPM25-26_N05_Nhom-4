<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking của tôi</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="padding:40px;">

<h2 style="text-align:center;margin-bottom:30px;">Danh sách Booking</h2>

<div style="max-width:900px;margin:auto;">
    <table style="width:100%;border-collapse:collapse;text-align:center;">
        <thead>
            <tr style="background:#222;color:#fff;">
                <th style="padding:10px;">ID</th>
                <th>Check-in</th>
                <th>Check-out</th>
                <th>Tổng tiền</th>
                <th>Thanh toán</th>
                <th>Hành động</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="b : ${bookings}" style="border-bottom:1px solid #ddd;">
                <td th:text="${b.id}"></td>
                <td th:text="${b.checkInDate}"></td>
                <td th:text="${b.checkOutDate}"></td>
                <td th:text="${b.totalPrice} + ' VNĐ'"></td>
                <td th:text="${b.paymentStatus}"></td>
                <td>
                    <a th:href="@{/invoice/{id}(id=${b.id})}"
                       style="color:#d4af37;font-weight:bold;">
                        Xem hóa đơn
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

    <div style="text-align:center;margin-top:30px;">
        <a href="/" style="color:#d4af37;">← Về trang chủ</a>
    </div>
</div>

</body>
</html>
