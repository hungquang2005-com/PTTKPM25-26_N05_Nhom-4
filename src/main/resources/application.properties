# ===================================
# CẤU HÌNH DATABASE MYSQL
# ===================================
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# CẤU HÌNH JPA / HIBERNATE
# ===================================
# update: tự động cập nhật bảng khi entity thay đổi
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===================================
# CẤU HÌNH SERVER
# ===================================
server.port=8080

# ===================================
# CẤU HÌNH THYMELEAF
# ===================================
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ===================================
# CẤU HÌNH ENCODING UTF-8
# ===================================
spring.mandatory-file-encoding=UTF-8
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true